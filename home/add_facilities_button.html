<button id="add-facilities-btn" class="primary-btn">Add Facilities</button>

<div id="custom-modal" class="modal-overlay">
    <div class="modal-content">
        <p>This is my custom popup!</p>
        <button id="close-modal-btn" class="primary-btn">Close</button>
    </div>
</div>

<script>
    const modal = document.getElementById('custom-modal');
    document.getElementById('add-facilities-btn').addEventListener('click', () => {
        modal.style.display = 'block';
    });
    document.getElementById('close-modal-btn').addEventListener('click', () => {
        modal.style.display = 'none';
    });
</script>
