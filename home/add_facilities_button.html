<button id="add-facilities-btn">Add Facilities</button>

<div id="custom-modal" style="display:none; position:fixed; top:20%; left:30%; background:white; padding:20px; border:2px solid black;">
    <p>This is my custom popup!</p>
    <button id="close-modal-btn">Close</button>
</div>

<script>
    const modal = document.getElementById('custom-modal');
    
    document.getElementById('add-facilities-btn').addEventListener('click', () => {
        modal.style.display = 'block';
    });

    document.getElementById('close-modal-btn').addEventListener('click', () => {
        modal.style.display = 'none';
    });
</script>
